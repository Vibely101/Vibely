{% extends 'base.html' %}
{% block title %} - Forgot Password{% endblock %}
{% block content %}
<div class="auth">
  <div class="card">
    <h1>Reset your password</h1>
    <form method="post">
      {{ form.hidden_tag() }}
      <p>{{ form.email.label }}<br>{{ form.email(class_='input', placeholder='Enter your email') }}</p>
      <p>{{ form.submit(class_='btn') }}</p>
    </form>
  </div>
</div>
{% endblock %}
